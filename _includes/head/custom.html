{% include base_path %}

<!-- Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Favicon -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
  :root {
    --accent: #3d6098;
    --accent-light: #e8eef6;
    --text-primary: #1a1a2e;
    --text-secondary: #555;
    --text-muted: #888;
    --border-light: #e4e8ec;
  }

  #progress-bar {
    position: fixed; top: 0; left: 0; width: 0%; height: 2px;
    background: var(--accent); z-index: 9999; transition: width 0.1s ease-out;
  }

  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }

  /* Global font tightening */
  .page__content { font-size: 0.82rem; line-height: 1.55; color: var(--text-primary); }
  .page__content p { margin-bottom: 0.5em; }
  .page__content h2 { font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em; margin: 1.2em 0 0.4em; color: var(--text-primary); border-bottom: 1.5px solid var(--border-light); padding-bottom: 0.2em; }
  .page__content h3 { font-size: 0.92rem; font-weight: 600; margin: 0.8em 0 0.3em; }
  .page__content ol, .page__content ul { font-size: 0.8rem; line-height: 1.5; }
  .page__content ol li, .page__content ul li { margin-bottom: 0.2em; }

  /* Author profile sidebar */
  .author__name { font-size: 1.05rem; font-weight: 600; }
  .author__bio { font-size: 0.78rem; line-height: 1.45; color: var(--text-secondary); word-wrap: break-word; overflow-wrap: break-word; }
  .author__urls li { font-size: 0.78rem; }
  .sidebar { overflow-x: hidden; }
  .author__content { overflow: hidden; }

  /* Archive / Publication items */
  .archive__item { margin-bottom: 0.25em; }
  .archive__item-title { font-size: 0.78rem !important; font-weight: 500; line-height: 1.3; margin-bottom: 0.05em; margin-top: 0.2em !important; }
  .archive__item-title a { color: var(--text-primary); text-decoration: none; }
  .archive__item-title a:hover { color: var(--accent); }
  .archive__item-excerpt { font-size: 0.74rem; color: var(--text-secondary); margin-top: 0.05em; line-height: 1.35; }
  .archive__item p { font-size: 0.74rem; margin: 0.05em 0; line-height: 1.35; }

  /* Page title */
  .page__title { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }

  /* Masthead nav */
  .greedy-nav a { font-size: 0.8rem; }
  .greedy-nav .visible-links a:before { background: var(--accent); }

  /* News list */
  .news-list { list-style: none; padding-left: 0; margin-top: 8px; }
  .news-list li { padding: 4px 0; border-bottom: 1px solid var(--border-light); font-size: 0.8rem; }
  .news-date { color: var(--accent); font-weight: 600; margin-right: 6px; font-size: 0.76rem; }

  /* Links */
  .page__content a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.15s; }
  .page__content a:hover { border-bottom-color: var(--accent); }

  /* Tables */
  .page__content table { font-size: 0.78rem; border-collapse: collapse; width: 100%; }
  .page__content table th { background: var(--accent-light); font-weight: 600; text-align: left; padding: 5px 8px; border: 1px solid var(--border-light); }
  .page__content table td { padding: 5px 8px; border: 1px solid var(--border-light); }

  /* Publication authors */
  .pub-authors { font-size: 0.72rem; color: var(--text-secondary); margin: 0.05em 0 0.1em; line-height: 1.35; }

  /* Publication section numbering */
  .pub-section { counter-reset: pub-counter; }
  .pub-section .list__item { counter-increment: pub-counter; position: relative; padding-left: 2.4em; margin-bottom: 0.15em; }
  .pub-section .list__item::before { content: "[" counter(pub-counter) "]"; position: absolute; left: 0; top: 0; font-weight: 600; color: var(--accent); font-size: 0.74rem; }

  /* BibTeX copy button */
  .bibtex-btn {
    display: inline-flex; align-items: center; gap: 3px;
    background: var(--accent-light); color: var(--accent); border: 1px solid var(--border-light);
    border-radius: 3px; padding: 1px 7px; font-size: 0.68rem; font-weight: 500;
    cursor: pointer; transition: all 0.15s; line-height: 1.6; vertical-align: middle;
    font-family: 'Inter', sans-serif;
  }
  .bibtex-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .bibtex-btn.copied { background: #27ae60; color: #fff; border-color: #27ae60; }
  .bibtex-btn svg { width: 10px; height: 10px; fill: currentColor; }

  /* Hobby images */
  .hobby-gallery { display: flex; gap: 10px; flex-wrap: wrap; margin: 8px 0; }
  .hobby-gallery img { height: 90px; border-radius: 4px; object-fit: cover; }

  /* Sponsor images */
  .sponsor-row { display: flex; gap: 24px; flex-wrap: wrap; align-items: center; margin: 8px 0; opacity: 0.8; }
  .sponsor-row img { height: 70px; filter: grayscale(30%); transition: filter 0.2s; }
  .sponsor-row img:hover { filter: grayscale(0%); }

  /* Referee cards */
  .referee-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-top: 8px; }
  .referee-card { background: #fafbfc; padding: 12px; border-radius: 5px; border-left: 3px solid var(--accent); font-size: 0.78rem; line-height: 1.45; }
  .referee-card strong { font-size: 0.82rem; }
  .referee-card a { font-size: 0.75rem; }

  /* CV download button */
  .btn--primary { font-size: 0.82rem !important; padding: 6px 14px !important; }

  /* Archive page section headers */
  .archive { font-size: 0.82rem; line-height: 1.55; color: var(--text-primary); }
  .archive p { margin-bottom: 0.5em; }
  .archive h2 { font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em; margin: 1.2em 0 0.4em; border-bottom: 1.5px solid var(--border-light); padding-bottom: 0.2em; }
  .archive h3 { font-size: 0.92rem; font-weight: 600; margin: 0.8em 0 0.3em; }
  .archive ol, .archive ul { font-size: 0.8rem; line-height: 1.5; }
  .archive ol li, .archive ul li { margin-bottom: 0.2em; }
  .archive hr { margin: 0.3em 0; }

  /* Responsive */
  @media (max-width: 768px) {
    .page__content { font-size: 0.8rem; }
    .archive { font-size: 0.8rem; }
    .archive__item-title { font-size: 0.76rem !important; }
    .referee-grid { grid-template-columns: 1fr; }
  }
</style>
