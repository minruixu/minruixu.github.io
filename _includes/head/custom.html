{% include base_path %}

<!-- Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Favicon -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- al-folio Typography: Playfair Display + Source Sans 3 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ====================================================================
     AL-FOLIO INSPIRED DESIGN SYSTEM
     ==================================================================== */

  :root {
    /* Accent palette */
    --accent: #6C3082;
    --accent-hover: #8B44A3;
    --accent-light: #f3eaf8;
    --accent-badge: #6C3082;

    /* Text */
    --text-primary: #212529;
    --text-secondary: #6c757d;
    --text-muted: #999;

    /* Surfaces */
    --border-light: #dee2e6;
    --bg-alt: #f8f9fa;
    --card-shadow: rgba(0, 0, 0, 0.06);

    /* Typography */
    --font-heading: 'Playfair Display', 'Georgia', 'Times New Roman', serif;
    --font-body: 'Source Sans 3', 'Helvetica Neue', 'Arial', sans-serif;
    --font-mono: 'Fira Code', 'Source Code Pro', 'Consolas', monospace;
  }

  html[data-theme="dark"] {
    --accent: #bb86fc;
    --accent-hover: #d4a5ff;
    --accent-light: rgba(187, 134, 252, 0.1);
    --accent-badge: #bb86fc;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0a0;
    --text-muted: #707070;
    --border-light: #2a2a4a;
    --bg-alt: #16213e;
    --card-shadow: rgba(0, 0, 0, 0.3);
  }

  /* ── Progress Bar ─────────────────────────────────────────────────── */
  #progress-bar {
    position: fixed; top: 0; left: 0; width: 0%; height: 2px;
    background: var(--accent); z-index: 9999;
    transition: width 0.1s ease-out;
  }

  /* ── Global Typography ────────────────────────────────────────────── */
  body {
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  h1, h2, h3, h4, h5, h6 {
    font-family: var(--font-heading);
  }

  tt, code, kbd, samp, pre {
    font-family: var(--font-mono);
  }

  /* ── Page Content ─────────────────────────────────────────────────── */
  .page__content {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text-primary);
  }
  .page__content p { margin-bottom: 0.65em; }

  .page__content h2 {
    font-family: var(--font-heading);
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 1.6em 0 0.5em;
    color: var(--text-primary);
  }
  .page__content h3 {
    font-family: var(--font-heading);
    font-size: 1.05rem;
    font-weight: 700;
    margin: 1em 0 0.4em;
  }
  .page__content ol, .page__content ul {
    font-size: 0.86rem;
    line-height: 1.6;
  }
  .page__content ol li, .page__content ul li { margin-bottom: 0.3em; }

  /* ── Page Title ───────────────────────────────────────────────────── */
  .page__title {
    font-family: var(--font-heading);
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }

  /* ── Author Sidebar ──────────────────────────────────────────────── */
  .author__avatar img {
    border-radius: 50%;
    border: 3px solid var(--accent-light);
    transition: border-color 0.3s;
  }
  .author__avatar img:hover {
    border-color: var(--accent);
  }
  .author__name {
    font-family: var(--font-heading);
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .author__bio {
    font-size: 0.82rem;
    line-height: 1.5;
    color: var(--text-secondary);
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .author__urls li { font-size: 0.82rem; }
  .sidebar { overflow-x: hidden; }
  .author__content { overflow: hidden; }
  .author__urls-wrapper .btn--inverse {
    border-color: var(--accent);
    color: var(--accent);
    font-size: 0.78rem;
    border-radius: 3px;
    transition: all 0.2s;
  }
  .author__urls-wrapper .btn--inverse:hover {
    background: var(--accent);
    color: #fff;
  }

  /* ── Masthead / Navigation ─────────────────────────────────────── */
  .masthead {
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
  }
  .greedy-nav a {
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .greedy-nav .visible-links a:before { background: var(--accent); }
  .masthead__menu-item--lg a {
    font-family: var(--font-heading) !important;
    font-size: 1.05rem !important;
    font-weight: 900 !important;
    letter-spacing: -0.01em;
  }
  .masthead__menu-item.selected a {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── Archive / Publication Items ──────────────────────────────── */
  .archive__item { margin-bottom: 0.5em; }
  .archive__item-title {
    font-family: var(--font-body) !important;
    font-size: 0.85rem !important;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 0.1em;
    margin-top: 0.3em !important;
  }
  .archive__item-title a {
    color: var(--text-primary);
    text-decoration: none;
    transition: color 0.15s;
  }
  .archive__item-title a:hover { color: var(--accent); }
  .archive__item-excerpt {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-top: 0.1em;
    line-height: 1.45;
  }
  .archive__item p {
    font-size: 0.8rem;
    margin: 0.1em 0;
    line-height: 1.45;
  }

  /* ── Publication Authors ──────────────────────────────────────── */
  .pub-authors {
    font-size: 0.78rem;
    color: var(--text-secondary);
    margin: 0.1em 0 0.15em;
    line-height: 1.4;
  }

  /* ── Publication Section Numbering ────────────────────────────── */
  .pub-section { counter-reset: pub-counter; }
  .pub-section .list__item {
    counter-increment: pub-counter;
    position: relative;
    padding-left: 2.6em;
    margin-bottom: 0.4em;
  }
  .pub-section .list__item::before {
    content: "[" counter(pub-counter) "]";
    position: absolute;
    left: 0;
    top: 0.3em;
    font-weight: 700;
    color: var(--accent);
    font-size: 0.78rem;
    font-family: var(--font-body);
  }

  /* ── BibTeX / Action Buttons ──────────────────────────────────── */
  .bibtex-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--accent-light);
    color: var(--accent);
    border: 1px solid var(--border-light);
    border-radius: 3px;
    padding: 2px 8px;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.6;
    vertical-align: middle;
    font-family: var(--font-body);
  }
  .bibtex-btn:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .bibtex-btn.copied {
    background: #27ae60;
    color: #fff;
    border-color: #27ae60;
  }
  .bibtex-btn svg { width: 11px; height: 11px; fill: currentColor; }

  /* ── Links ─────────────────────────────────────────────────────── */
  .page__content a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .page__content a:hover {
    border-bottom-color: var(--accent);
  }

  /* ── Job Market Banner ─────────────────────────────────────────── */
  .job-market-banner {
    background: var(--accent-light);
    border-left: 4px solid var(--accent);
    padding: 12px 18px;
    margin-bottom: 1.5em;
    border-radius: 4px;
    font-size: 0.88rem;
    line-height: 1.5;
    color: var(--text-primary);
  }
  html[data-theme="dark"] .job-market-banner {
    background: rgba(187, 134, 252, 0.08);
  }

  /* ── News List ─────────────────────────────────────────────────── */
  .news-list {
    list-style: none;
    padding-left: 0;
    margin-top: 10px;
  }
  .news-list li {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border-light);
    font-size: 0.86rem;
    line-height: 1.5;
  }
  .news-list li:last-child { border-bottom: none; }
  .news-date {
    color: var(--accent);
    font-weight: 700;
    font-size: 0.78rem;
    font-family: var(--font-mono);
    white-space: nowrap;
    min-width: 60px;
  }

  /* ── Selected Publications on About ───────────────────────────── */
  .page__content .selected-pubs {
    list-style: none;
    padding-left: 0;
    counter-reset: sel-pub;
  }
  .page__content .selected-pubs li {
    counter-increment: sel-pub;
    position: relative;
    padding-left: 2em;
    margin-bottom: 0.95em;
    font-size: 0.86rem;
    line-height: 1.55;
  }
  .page__content .selected-pubs li::before {
    content: counter(sel-pub) ".";
    position: absolute;
    left: 0;
    font-weight: 700;
    color: var(--accent);
  }
  .pub-venue {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    padding: 0 6px;
    border-radius: 3px;
    font-size: 0.65rem;
    font-weight: 700;
    margin-right: 5px;
    vertical-align: middle;
    letter-spacing: 0.02em;
    font-family: var(--font-body);
    line-height: 1.7;
  }
  .page__content .selected-pubs .pub-quote {
    display: block;
    margin-top: 0.05rem;
    position: relative;
    border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
    background: linear-gradient(90deg, var(--accent-light) 0%, transparent 100%);
    box-shadow: 0 10px 24px -24px var(--card-shadow);
  }
  .page__content .selected-pubs .pub-toggle {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
  .page__content .selected-pubs .pub-title {
    display: block;
    position: relative;
    padding: 0.52rem 0.85rem;
    cursor: pointer;
    color: var(--text-primary);
    font-size: inherit;
    font-weight: 400;
    letter-spacing: normal;
    text-transform: none;
  }
  .page__content .selected-pubs .pub-title:hover {
    color: var(--accent);
  }
  .page__content .selected-pubs .pub-meta {
    padding: 0 0.85rem 0.48rem;
    color: var(--text-secondary);
    font-size: 0.78rem;
    line-height: 1.5;
  }
  .page__content .selected-pubs .pub-quote-body {
    display: none;
    padding: 0 0.85rem 0.72rem;
    color: var(--text-secondary);
    font-size: 0.78rem;
    font-style: italic;
    letter-spacing: 0.01em;
  }
  .page__content .selected-pubs .pub-toggle:checked ~ .pub-quote-body {
    display: block;
  }
  .archive__item-title .pub-venue {
    font-size: 0.62rem;
    vertical-align: text-bottom;
  }

  /* ── Education & Experience Timeline ──────────────────────────── */
  .page__content ol {
    position: relative;
  }

  /* ── Tables ───────────────────────────────────────────────────── */
  .page__content table {
    font-size: 0.84rem;
    border-collapse: collapse;
    width: 100%;
  }
  .page__content table th {
    background: var(--accent-light);
    font-weight: 600;
    text-align: left;
    padding: 8px 10px;
    border: 1px solid var(--border-light);
  }
  .page__content table td {
    padding: 8px 10px;
    border: 1px solid var(--border-light);
  }

  /* ── Hobby Gallery ─────────────────────────────────────────────── */
  .hobby-gallery {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin: 12px 0;
  }
  .hobby-gallery img {
    height: 110px;
    border-radius: 6px;
    object-fit: cover;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px var(--card-shadow);
  }
  .hobby-gallery img:hover {
    transform: scale(1.03);
    box-shadow: 0 4px 16px var(--card-shadow);
  }

  /* ── Sponsor Row ───────────────────────────────────────────────── */
  .sponsor-row {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    align-items: center;
    margin: 12px 0;
    opacity: 0.8;
  }
  .sponsor-row img {
    height: 70px;
    filter: grayscale(30%);
    transition: filter 0.2s;
  }
  .sponsor-row img:hover { filter: grayscale(0%); }

  /* ── Award Cards ───────────────────────────────────────────────── */
  .award-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border-light);
    font-size: 0.86rem;
    line-height: 1.55;
  }
  .award-item:last-child { border-bottom: none; }
  .award-date {
    font-family: var(--font-mono);
    font-size: 0.74rem;
    color: var(--text-muted);
    white-space: nowrap;
    min-width: 70px;
  }

  /* ── Service Lists ─────────────────────────────────────────────── */
  .service-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 6px;
  }
  .service-grid li {
    font-size: 0.84rem;
    padding: 4px 0;
  }

  /* ── Referee Cards (if used) ───────────────────────────────────── */
  .referee-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
    margin-top: 10px;
  }
  .referee-card {
    background: var(--bg-alt);
    padding: 14px;
    border-radius: 6px;
    border-left: 3px solid var(--accent);
    font-size: 0.84rem;
    line-height: 1.5;
  }

  /* ── CV Download Button ────────────────────────────────────────── */
  .btn--primary {
    font-size: 0.86rem !important;
    padding: 8px 16px !important;
    border-radius: 4px !important;
    background: var(--accent) !important;
    border-color: var(--accent) !important;
    transition: all 0.2s !important;
  }
  .btn--primary:hover {
    background: var(--accent-hover) !important;
    border-color: var(--accent-hover) !important;
  }

  /* ── Archive Page (Awards, Service, Teaching) ──────────────────── */
  .archive {
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--text-primary);
  }
  .archive p { margin-bottom: 0.6em; }
  .archive h2 {
    font-family: var(--font-heading);
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 1.6em 0 0.5em;
  }
  .archive h3 {
    font-family: var(--font-heading);
    font-size: 1.05rem;
    font-weight: 700;
    margin: 1em 0 0.4em;
  }
  .archive ol, .archive ul {
    font-size: 0.86rem;
    line-height: 1.6;
  }
  .archive ol li, .archive ul li { margin-bottom: 0.3em; }
  .archive hr { margin: 0.4em 0; border-color: var(--border-light); }

  /* ── Footer ────────────────────────────────────────────────────── */
  .page__footer {
    background: var(--bg-alt);
    border-top: 1px solid var(--border-light);
  }
  .page__footer footer {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5em 2em;
    text-align: center;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .footer-social {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 10px;
  }
  .footer-social a {
    color: var(--text-secondary);
    font-size: 1.1rem;
    transition: color 0.15s;
    text-decoration: none;
  }
  .footer-social a:hover { color: var(--accent); }

  /* ── Gentle Page Fade-in (content only, not sidebar) ────────────── */
  .page__inner-wrap,
  .archive {
    animation: fadeIn 0.3s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* ── Publication Overview (individual pub pages) ───────────────── */
  .publication-overview {
    border-color: var(--border-light);
    background: var(--bg-alt);
  }

  /* ── Responsive ────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    .page__content { font-size: 0.88rem; }
    .page__title { font-size: 1.35rem; }
    .archive { font-size: 0.86rem; }
    .archive__item-title { font-size: 0.82rem !important; }
    .referee-grid { grid-template-columns: 1fr; }
    .service-grid { grid-template-columns: 1fr; }
    .news-list li { flex-direction: column; gap: 2px; }
    .hobby-gallery img { height: 85px; }
  }
</style>
